name: Native Android Production Build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
      EXPO_PUBLIC_GEMINI_MODEL: ${{ secrets.EXPO_PUBLIC_GEMINI_MODEL }}
      EXPO_PUBLIC_GOOGLE_MAP_API: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAP_API }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: myApp/package-lock.json

      - name: Install Dependencies
        working-directory: myApp
        run: npm install

      - name: Inject Build Number
        working-directory: myApp
        run: |
          sed -i "s/export const BUILD_NUMBER = 'dev';/export const BUILD_NUMBER = '${{ github.run_number }}';/" constants/buildInfo.ts
          echo "Build number set to: ${{ github.run_number }}"

      - name: Prebuild Native Files
        working-directory: myApp
        run: npx expo prebuild --platform android

      # Java setup is placed HERE so it can cache the newly generated Gradle files
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        working-directory: myApp/android/app
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 is empty"
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Release Bundle & APK
        working-directory: myApp/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m'"
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release AAB (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: myApp/android/app/build/outputs/bundle/release/*.aab

      - name: Upload Release APK (For Direct Install)
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: myApp/android/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' # Only run on the main branch
        with:
          tag_name: "build-${{ github.run_number }}" # Automatically generates a unique tag like "build-42"
          name: "Production Build #${{ github.run_number }}"
          body: "Automated Android release build from the main branch."
          files: |
            myApp/android/app/build/outputs/bundle/release/*.aab
            myApp/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
